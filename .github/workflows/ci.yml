name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # release-please PRs are opened by github-actions[bot]; GITHUB_TOKEN skips pull_request.
  pull_request_target:
    branches: [main]

concurrency:
  # Include event_name so pull_request and pull_request_target don't share a
  # group — otherwise the (skipped) target run cancels the real pull_request run.
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_target' &&
        github.event.pull_request.user.login == 'github-actions[bot]')
    name: Typecheck, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build TS packages (result first so maybe/pattern can resolve its dist/)
        run: |
          bun run --filter '@onrails/result' build
          bun run --filter '@onrails/maybe' --filter '@onrails/pattern' build
      - name: Check
        run: bun run check
