name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # for npm provenance

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      result_released: ${{ steps.release.outputs['packages/result--release_created'] }}
      maybe_released: ${{ steps.release.outputs['packages/maybe--release_created'] }}
      pattern_released: ${{ steps.release.outputs['packages/pattern--release_created'] }}
      codemod_released: ${{ steps.release.outputs['packages/codemod--release_created'] }}
      eslint_released: ${{ steps.release.outputs['packages/eslint-plugin--release_created'] }}
      biome_released: ${{ steps.release.outputs['packages/biome-plugin--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-result:
    needs: release-please
    if: ${{ needs.release-please.outputs.result_released == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build
        working-directory: packages/result
        run: bun run build
      - name: Publish
        working-directory: packages/result
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-maybe:
    needs: [release-please, publish-result]
    if: ${{ always() && needs.release-please.outputs.maybe_released == 'true' && (needs.publish-result.result == 'success' || needs.publish-result.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build
        working-directory: packages/maybe
        run: bun run build
      - name: Publish
        working-directory: packages/maybe
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pattern:
    needs: release-please
    if: ${{ needs.release-please.outputs.pattern_released == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build
        working-directory: packages/pattern
        run: bun run build
      - name: Publish
        working-directory: packages/pattern
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-codemod:
    needs: release-please
    if: ${{ needs.release-please.outputs.codemod_released == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Publish
        working-directory: packages/codemod
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-eslint:
    needs: release-please
    if: ${{ needs.release-please.outputs.eslint_released == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Publish
        working-directory: packages/eslint-plugin
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-biome:
    needs: release-please
    if: ${{ needs.release-please.outputs.biome_released == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Publish
        working-directory: packages/biome-plugin
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
