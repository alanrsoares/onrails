name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # for npm provenance

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: result,        path: packages/result,        build: true,  needs_result: false }
          - { name: maybe,         path: packages/maybe,         build: true,  needs_result: true  }
          - { name: pattern,       path: packages/pattern,       build: true,  needs_result: false }
          - { name: codemod,       path: packages/codemod,       build: false, needs_result: false }
          - { name: eslint-plugin, path: packages/eslint-plugin, build: false, needs_result: false }
          - { name: biome-plugin,  path: packages/biome-plugin,  build: false, needs_result: false }
          - { name: twoslash,      path: packages/twoslash,      build: true,  needs_result: false }
          - { name: docgen,        path: packages/docgen,        build: true,  needs_result: true  }
    steps:
      - id: gate
        env:
          PATHS: ${{ needs.release-please.outputs.paths_released }}
          PATH_TO_CHECK: ${{ matrix.path }}
        run: |
          if echo "$PATHS" | grep -q "\"$PATH_TO_CHECK\""; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.name }} — not in release set."
          fi
      - if: steps.gate.outputs.released == 'true'
        uses: actions/checkout@v4
      - if: steps.gate.outputs.released == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - if: steps.gate.outputs.released == 'true'
        run: bun install --frozen-lockfile
      - if: steps.gate.outputs.released == 'true' && matrix.needs_result
        name: Build @onrails/result (provides .d.ts for downstream dts)
        run: bun run --filter '@onrails/result' build
      - if: steps.gate.outputs.released == 'true' && matrix.build
        name: Build ${{ matrix.name }}
        working-directory: ${{ matrix.path }}
        run: bun run build
      - if: steps.gate.outputs.released == 'true'
        name: Publish ${{ matrix.name }}
        working-directory: ${{ matrix.path }}
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
